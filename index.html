<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FWC Tracker" />
  <title>FWC Watch Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-top">
        <div>
          <p class="eyebrow">FIFA World Cup 2026</p>
          <h1>Watch Tracker</h1>
        </div>
        <button id="installBtn" class="ghost hidden">Install</button>
      </div>
      <section class="progress-card" aria-label="watch progress">
        <div class="orb" id="progressOrb"><span id="progressPct">0%</span></div>
        <div>
          <p class="muted">Games logged</p>
          <h2><span id="watchedCount">0</span><span class="muted"> / </span><span id="totalCount">104</span></h2>
          <p id="nextMatch" class="tiny">Loading schedule…</p>
        </div>
      </section>
    </header>

    <main>
      <section class="controls sticky-controls">
        <label class="search-wrap">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Brazil, Group A, final…" autocomplete="off" />
        </label>
        <div class="chips" id="statusFilters" aria-label="status filters">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="watched">Watched</button>
          <button class="chip" data-filter="unwatched">Unwatched</button>
          <button class="chip" data-filter="today">Today</button>
          <button class="chip" data-filter="knockout">Playoffs</button>
        </div>
        <div class="select-row">
          <select id="stageSelect" aria-label="stage filter">
            <option value="all">All stages</option>
          </select>
          <select id="groupSelect" aria-label="group filter">
            <option value="all">All groups</option>
          </select>
        </div>
      </section>

      <section class="quick-actions">
        <button id="exportBtn" class="secondary">Export log</button>
        <label class="secondary file-label">Import log<input id="importInput" type="file" accept="application/json" /></label>
        <button id="resetBtn" class="danger">Reset</button>
      </section>

      <section id="matchList" class="match-list" aria-live="polite"></section>
    </main>
  </div>

  <dialog id="matchDialog">
    <form method="dialog" class="dialog-card">
      <button class="close" value="cancel" aria-label="Close">×</button>
      <p class="eyebrow" id="dialogMeta"></p>
      <h2 id="dialogTitle"></h2>
      <p id="dialogVenue" class="muted"></p>

      <fieldset>
        <legend>How did you watch it?</legend>
        <div class="status-grid">
          <label><input type="radio" name="watchStatus" value="unwatched" /> Not yet</label>
          <label><input type="radio" name="watchStatus" value="live" /> Live</label>
          <label><input type="radio" name="watchStatus" value="replay" /> Replay</label>
          <label><input type="radio" name="watchStatus" value="highlights" /> Highlights</label>
          <label><input type="radio" name="watchStatus" value="skipped" /> Skipped</label>
        </div>
      </fieldset>

      <label>Rating
        <input id="ratingInput" type="range" min="0" max="5" step="0.5" />
        <span id="ratingValue" class="tiny"></span>
      </label>
      <label>Where watched
        <input id="whereInput" type="text" placeholder="Home, bar, plane…" />
      </label>
      <label>With whom
        <input id="withInput" type="text" placeholder="Alone, friends…" />
      </label>
      <label>Notes
        <textarea id="notesInput" rows="4" placeholder="Best moment, vibe, context…"></textarea>
      </label>
      <button id="saveBtn" class="primary" value="default">Save log</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
